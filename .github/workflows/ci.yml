name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Format check with ruff
        run: uv run ruff format --check src/ tests/

      - name: Run backend tests with coverage
        run: uv run pytest tests/ --cov=src/lingosips --cov-fail-under=90

  frontend:
    name: Frontend — lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend unit tests with coverage
        run: cd frontend && npm run test -- --coverage

      - name: axe-core accessibility scan
        run: cd frontend && npx playwright test --project=chromium e2e/a11y/

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install frontend dependencies and Playwright browsers
        run: |
          cd frontend && npm ci
          npx playwright install --with-deps chromium

      - name: Start test server in background
        run: make test-server &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:7842/health && break
            sleep 1
          done

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test
